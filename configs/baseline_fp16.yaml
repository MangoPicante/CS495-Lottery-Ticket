# Baseline FP16 decoder-only transformer (~125M parameters)
# Architecture mirrors GPT-2-small for direct comparison.
# Run: python scripts/training/train.py --config configs/baseline_fp16.yaml

model:
  model_type: baseline          # selects DecoderTransformer (nn.Linear)
  name: baseline_125M
  vocab_size: 50257             # GPT-2 tokenizer
  hidden_size: 768
  num_layers: 12
  num_heads: 12
  ffn_size: 2048                # SwiGLU intermediate dimension
  max_seq_len: 512
  dropout: 0.1
  bias: false

dataset:
  name: wikitext-2
  tokenizer: gpt2               # HuggingFace tokenizer name

training:
  device: cpu                   # change to "cuda" if a GPU is available
  dtype: float32                # float32 | bfloat16 | float16
  seed: 42
  batch_size: 8
  gradient_accumulation: 4      # effective batch = batch_size × grad_accum
  max_steps: 10000
  learning_rate: 3.0e-4
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  warmup_steps: 500
  max_grad_norm: 1.0
  log_every: 100
  eval_every: 500
  checkpoint_every: 1000

output:
  dir: results/logs/baseline_fp16
  checkpoint_dir: results/checkpoints/baseline_fp16
