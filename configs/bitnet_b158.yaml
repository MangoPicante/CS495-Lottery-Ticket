# BitNet b1.58 — 125M ternary model (Phase 2 starting point)
# Identical architecture to baseline_fp16.yaml; only the linear layer type changes.
# Run: python scripts/training/train.py --config configs/bitnet_b158.yaml

model:
  model_type: bitnet_b158       # selects BitNetTransformer (BitLinear)
  name: bitnet_125M
  vocab_size: 50257
  hidden_size: 768
  num_layers: 12
  num_heads: 12
  ffn_size: 2048
  max_seq_len: 512
  dropout: 0.1
  bias: false

dataset:
  name: wikitext-2
  tokenizer: gpt2

training:
  device: cpu
  dtype: float32                # float32 recommended for QAT on CPU
  seed: 42
  batch_size: 8
  gradient_accumulation: 4
  max_steps: 10000
  learning_rate: 3.0e-4
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  warmup_steps: 500
  max_grad_norm: 1.0
  log_every: 100
  eval_every: 500
  checkpoint_every: 1000

output:
  dir: results/logs/bitnet_b158_125M
  checkpoint_dir: results/checkpoints/bitnet_b158_125M
